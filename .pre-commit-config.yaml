minimum_pre_commit_version: "3.6.0"

repos:
  - repo: local
    hooks:
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        args: ["-x"]
        files: '(^|/).*\.sh$|^\.githooks/.*\.sh$'
      - id: detect-sensitive-info
        name: detect sensitive info
        entry: .githooks/check-sensitive-info.sh
        language: system
        pass_filenames: false
