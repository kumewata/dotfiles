name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Evaluate flake
        run: nix flake check

      - name: Check formatting
        run: nix fmt -- --fail-on-change

      - name: Run pre-commit checks
        run: nix run .#check
