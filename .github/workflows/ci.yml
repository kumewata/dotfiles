name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      USER: ci

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@2be1df9ed6cfd12d52bfbba7af79472420fa5299 # v3.18.0

      - name: Evaluate flake
        run: nix flake check --impure

      - name: Check formatting
        run: nix fmt -- --fail-on-change

      - name: Run pre-commit checks
        run: nix run .#check
